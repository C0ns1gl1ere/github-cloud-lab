name: Full CI/CD Pipeline
on:
  push:
    branches: [main]
jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python version
        run: python --version
      - name: Verify files exist
        run: ls -R
      - name: Build Docker Image
        run: docker build -t webapp:latest ./webapp
